name: web-deploy-vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: https://awkvzbpnihtgceqdwisc.supabase.co
      VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_czq_XwvIyrAeg1lXbuh7pQ_XjfeonmL
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        id: validate
        shell: bash
        run: |
          missing=0
          [ -z "${{ secrets.VERCEL_TOKEN }}" ] && missing=1
          [ -z "${{ secrets.VERCEL_ORG_ID }}" ] && missing=1
          [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ] && missing=1
          if [ "$missing" -eq 1 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Missing Vercel secrets. Skipping deploy steps."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        if: steps.validate.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.validate.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.validate.outputs.ready == 'true'
        run: npm run build

      - name: Install Vercel CLI
        if: steps.validate.outputs.ready == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.validate.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Override Supabase web env for Vercel build
        if: steps.validate.outputs.ready == 'true'
        shell: bash
        run: |
          env_file=".vercel/.env.production.local"
          if [ ! -f "$env_file" ]; then
            touch "$env_file"
          fi
          sed -i '/^VITE_SUPABASE_URL=/d' "$env_file"
          sed -i '/^VITE_SUPABASE_PUBLISHABLE_KEY=/d' "$env_file"
          echo "VITE_SUPABASE_URL=https://awkvzbpnihtgceqdwisc.supabase.co" >> "$env_file"
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=sb_publishable_czq_XwvIyrAeg1lXbuh7pQ_XjfeonmL" >> "$env_file"
          echo "Supabase env pinned for this build."

      - name: Build Vercel output
        if: steps.validate.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy production
        if: steps.validate.outputs.ready == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN

name: web-ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.SUPABASE_PUBLISHABLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Bundle report
        run: npm run bundle:report

      - name: Bundle budget check
        run: npm run bundle:check

      - name: Upload bundle report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-bundle-report
          path: |
            dist/bundle-report.json
            dist/bundle-report.txt
